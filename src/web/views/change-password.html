<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Iniciar sesión - KeepCoding Testing</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 60px auto;
      padding: 0 16px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0057b8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #004494;
    }

    #result {
      margin-top: 20px;
      padding: 12px;
      border-radius: 4px;
      display: none;
    }

    #result.success {
      background: #e6f4ea;
      border: 1px solid #34a853;
      color: #1a5c30;
    }

    #result.error {
      background: #fce8e6;
      border: 1px solid #ea4335;
      color: #6b1c17;
    }
  </style>
</head>

<body>
  <h1>Iniciar sesión</h1>

  <form id="change-password-form">
    <label for="email">Correo electrónico</label>
    <input
      type="email"
      id="email"
      name="email"
      placeholder="tu@correo.com"
      required
    >

    <label for="currentPassword">Contraseña actual</label>
    <input
      type="password"
      id="currentPassword"
      name="currentPassword"
      placeholder="Tu contraseña actual"
      required
    >

    <label for="newPassword">Nueva contraseña</label>
    <input
      type="password"
      id="newPassword"
      name="newPassword"
      placeholder="Tu contraseña nueva"
      required
    >

    <button type="submit">Cambiar contraseña</button>
  </form>

  <div
    id="result"
    role="status"
    aria-live="polite"
  ></div>

  <footer style="margin-top: 40px; font-size: 0.75rem; color: #999; text-align: center;">
    &copy; <%= year %> KeepCoding
  </footer>

  <script>
    const form = document.getElementById('change-password-form');
    const resultDiv = document.getElementById('result');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;

      try {
        const response = await fetch('/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, currentPassword, newPassword }),
        });

        const data = await response.json();

        if (response.ok) {
          mostrarResultado('success', `Contraseña cambiada correctamente, ${data.username}`);
        } else {
          mostrarResultado('error', `Error: ${data.error}`);
        }
      } catch {
        mostrarResultado('error', 'No se pudo conectar con el servidor');
      }
    });

    function mostrarResultado(tipo, mensaje) {
      resultDiv.textContent = mensaje;
      resultDiv.className = tipo;
      resultDiv.style.display = 'block';
    }
  </script>
</body>

</html>
